<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Development - Nagano Takumi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] } } } }
    </script>
    <style>
        .lucide { width: 1.25rem; height: 1.25rem; display: inline-block; }
        html { scroll-behavior: smooth; }
        .hero-text-container { opacity: 0; transform: scale(1.25); filter: blur(10px); }
        @keyframes hero-zoom-out {
            0% { opacity: 0; transform: scale(1.25); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        .animate-hero-zoom { animation: hero-zoom-out 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="transition-colors duration-300 text-zinc-900 dark:text-zinc-100">
    <div id="top-bar" class="w-full py-2 border-b bg-zinc-50 dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 text-xs tracking-widest uppercase">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="hover:text-green-600 font-bold">Home</a>
            <div class="flex space-x-4">
                <a href="https://www.youtube.com/@Volvox0612" target="_blank"><i data-lucide="youtube"></i></a>
                <a href="https://www.instagram.com/takumi05012/" target="_blank"><i data-lucide="instagram"></i></a>
            </div>
        </div>
    </div>
    <header id="hero-header" class="relative py-32 text-center bg-cover bg-center bg-no-repeat overflow-hidden" style="background-image: url('images/header.png');">
        <div class="absolute inset-0 bg-white/20 dark:bg-black/30"></div>
        <div class="relative z-10 hero-text-container animate-hero-zoom">
            <h1 class="text-6xl md:text-8xl font-serif mb-2 tracking-tighter">App Development</h1>
            <p class="text-sm tracking-[0.3em] uppercase text-zinc-600 dark:text-zinc-300">Nagano Takumi</p>
        </div>
    </header>
    <nav id="sticky-nav" class="sticky top-0 z-50 transition-all duration-300 py-4 bg-white/95 dark:bg-zinc-900/95 backdrop-blur-md border-y border-zinc-100 dark:border-zinc-800">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest">
            <div class="flex space-x-8">
                <a href="video-editing.html" class="hover:text-green-600">Video</a>
                <a href="graphic-design.html" class="hover:text-green-600">Graphic</a>
                <a href="app-development.html" class="text-green-600">App</a>
                <a href="hobbies.html" class="hover:text-green-600">Hobby</a>
            </div>
            <button id="dark-mode-toggle"><i id="dark-icon" data-lucide="moon"></i><i id="light-icon" data-lucide="sun" class="hidden"></i></button>
        </div>
    </nav>
    <div class="bg-[url('images/back.png')] bg-cover bg-center bg-fixed min-h-screen">
        <div class="bg-white/40 dark:bg-zinc-950/40 backdrop-blur-[2px] min-h-screen py-16">
            <main class="max-w-6xl mx-auto px-4 space-y-24">
                <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
                    <div class="lg:col-span-7"><div class="rounded-[1.5rem] overflow-hidden shadow-2xl bg-black"><img src="images/音楽.jpg" class="w-full h-auto"></div></div>
                    <div class="lg:col-span-5 space-y-8 bg-white/80 dark:bg-zinc-900/80 p-8 rounded-[2rem] shadow-xl border border-white/20 dark:border-zinc-800/50">
                        <div class="flex items-center space-x-3 mb-6"><div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><i data-lucide="music"></i></div><h3 class="text-xl font-bold font-serif">Lyria Music Player</h3></div>
                        <p class="text-sm leading-relaxed text-zinc-600 dark:text-zinc-300 font-medium">Gemini AIを活用して制作した、ブラウザ上で動作する音楽プレイヤーアプリです。シャッフル機能やダウンロード機能を搭載しています。</p>
                        <div class="pt-6 border-t"><a href="https://volvox0.github.io/Lyria-Music-Player/" target="_blank" class="flex items-center justify-center space-x-3 w-full py-4 bg-zinc-900 dark:bg-green-700 text-white rounded-2xl hover:bg-green-600 shadow-lg font-bold tracking-widest text-xs uppercase"><span>Launch Application</span><i data-lucide="external-link"></i></a></div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script>
        lucide.createIcons();
        document.getElementById('dark-mode-toggle').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); document.getElementById('dark-icon').classList.toggle('hidden'); document.getElementById('light-icon').classList.toggle('hidden'); lucide.createIcons(); });
    </script>
</body>
</html>
