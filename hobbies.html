<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobbies & Life - Nagano Takumi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] } } } }
    </script>
    <style>
        .lucide { width: 1.25rem; height: 1.25rem; display: inline-block; }
        html { scroll-behavior: smooth; }
        .hero-text-container { opacity: 0; transform: scale(1.25); filter: blur(10px); }
        @keyframes hero-zoom-out {
            0% { opacity: 0; transform: scale(1.25); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        .animate-hero-zoom { animation: hero-zoom-out 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .media-container { overflow: hidden; border-radius: 1.25rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.2); position: relative; }
        #image-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        #image-modal.show { display: flex; }
    </style>
</head>
<body class="transition-colors duration-300 text-zinc-900 dark:text-zinc-100">
    <div id="top-bar" class="w-full py-2 border-b bg-zinc-50 dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 text-xs tracking-widest uppercase">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="hover:text-green-600 font-bold">Home</a>
            <div class="flex space-x-4">
                <a href="https://www.youtube.com/@Volvox0612" target="_blank"><i data-lucide="youtube"></i></a>
                <a href="https://www.instagram.com/takumi05012/" target="_blank"><i data-lucide="instagram"></i></a>
            </div>
        </div>
    </div>
    <header id="hero-header" class="relative py-32 text-center bg-cover bg-center overflow-hidden" style="background-image: url('images/header.png');">
        <div class="absolute inset-0 bg-white/20 dark:bg-black/30"></div>
        <div class="relative z-10 hero-text-container animate-hero-zoom">
            <h1 class="text-6xl md:text-8xl font-serif mb-2 tracking-tighter">Hobbies & Life</h1>
            <p class="text-sm tracking-[0.3em] uppercase text-zinc-600 dark:text-zinc-300">Nagano Takumi</p>
        </div>
    </header>
    <nav id="sticky-nav" class="sticky top-0 z-50 transition-all duration-300 py-4 bg-white/95 dark:bg-zinc-900/95 backdrop-blur-md border-y border-zinc-100 dark:border-zinc-800">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest">
            <div class="flex space-x-8"><a href="video-editing.html" class="hover:text-green-600">Video</a><a href="graphic-design.html" class="hover:text-green-600">Graphic</a><a href="app-development.html" class="hover:text-green-600">App</a><a href="hobbies.html" class="text-green-600">Hobby</a></div>
            <button id="dark-mode-toggle"><i id="dark-icon" data-lucide="moon"></i><i id="light-icon" data-lucide="sun" class="hidden"></i></button>
        </div>
    </nav>
    <div class="bg-[url('images/back.png')] bg-cover bg-center bg-fixed min-h-screen">
        <div class="bg-white/40 dark:bg-zinc-950/40 backdrop-blur-[2px] min-h-screen py-16">
            <main class="max-w-5xl mx-auto px-4 space-y-24">
                <!-- Blog Post 1: Warframe -->
                <article class="space-y-8">
                    <h2 class="text-4xl md:text-5xl font-serif leading-tight">Warframe Items Shop - 自作情報サイトの公開</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start bg-white/70 dark:bg-zinc-900/70 p-8 rounded-[2.5rem] shadow-2xl border border-white/20 dark:border-zinc-800/50">
                        <div class="lg:col-span-7"><div class="media-container aspect-video"><img src="images/shop1.jpeg" class="w-full h-full object-cover"></div></div>
                        <div class="lg:col-span-5 space-y-6">
                            <p class="text-sm md:text-base text-zinc-600 dark:text-zinc-400 leading-relaxed font-medium">大好きなゲーム「Warframe」のアイテム情報を集約した個人ショップ風サイトを制作しました。</p>
                            <a href="https://volvox0.shop/" target="_blank" class="flex items-center justify-between p-4 bg-zinc-900 text-white rounded-2xl hover:bg-green-600 shadow-lg"><span>https://volvox0.shop/</span><i data-lucide="external-link"></i></a>
                        </div>
                    </div>
                </article>
                <hr class="border-zinc-200 dark:border-zinc-800 opacity-30">
                <!-- Blog Post 2: PC Build -->
                <article class="space-y-8">
                    <h2 class="text-4xl md:text-5xl font-serif leading-tight">「絶対的安定」を求めた自作PC構成とこだわり</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start bg-white/70 dark:bg-zinc-900/70 p-8 rounded-[2.5rem] shadow-2xl">
                        <div class="lg:col-span-6">
                            <div class="media-container aspect-[3/4] bg-black relative group overflow-hidden">
                                <div id="pc-slider" class="w-full h-full cursor-zoom-in" onclick="openModal()"><img id="slide-img" src="images/status.png" class="w-full h-full object-contain transition-opacity duration-500"></div>
                                <button onclick="prevSlide()" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white"><i data-lucide="chevron-left"></i></button>
                                <button onclick="nextSlide()" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white"><i data-lucide="chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="lg:col-span-6 space-y-8">
                            <p class="text-sm md:text-base leading-relaxed text-zinc-600 dark:text-zinc-400 font-medium">長時間の動画エンコードや複雑なMOD環境下でも決して揺るがない、**『絶対的な安定性』**を最優先したビルドです。</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="p-4 rounded-2xl bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100/50 dark:border-blue-900/20"><p class="text-[10px] text-zinc-400 font-bold uppercase">CPU</p><p class="text-sm font-bold">Intel Core i7-14700F</p></div>
                                <div class="p-4 rounded-2xl bg-red-50/50 dark:bg-red-900/10 border border-red-100/50 dark:border-red-900/20"><p class="text-[10px] text-zinc-400 font-bold uppercase">GPU</p><p class="text-sm font-bold">Radeon RX 6800 XT</p></div>
                            </div>
                        </div>
                    </div>
                </article>
            </main>
        </div>
    </div>
    <div id="image-modal" onclick="closeModal()"><img id="modal-img" src="" class="max-w-[90vw] max-h-[90vh] object-contain shadow-2xl rounded-lg"></div>
    <script>
        lucide.createIcons();
        document.getElementById('dark-mode-toggle').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); document.getElementById('dark-icon').classList.toggle('hidden'); document.getElementById('light-icon').classList.toggle('hidden'); lucide.createIcons(); });
        const slides = ['images/status.png', 'images/pc.jpg', 'images/cpu.jpg'];
        let currentSlide = 0;
        function updateSlide() {
            const img = document.getElementById('slide-img');
            img.style.opacity = 0;
            setTimeout(() => { img.src = slides[currentSlide]; img.style.opacity = 1; }, 300);
        }
        function nextSlide() { currentSlide = (currentSlide + 1) % slides.length; updateSlide(); }
        function prevSlide() { currentSlide = (currentSlide - 1 + slides.length) % slides.length; updateSlide(); }
        function openModal() { document.getElementById('modal-img').src = slides[currentSlide]; document.getElementById('image-modal').classList.add('show'); document.body.style.overflow = 'hidden'; }
        function closeModal() { document.getElementById('image-modal').classList.remove('show'); document.body.style.overflow = ''; }
    </script>
</body>
</html>
