<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphic Design - Nagano Takumi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] } } } }
    </script>
    <style>
        .lucide { width: 1.25rem; height: 1.25rem; display: inline-block; }
        html { scroll-behavior: smooth; }
        .hero-text-container { opacity: 0; transform: scale(1.25); filter: blur(10px); }
        @keyframes hero-zoom-out {
            0% { opacity: 0; transform: scale(1.25); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        .animate-hero-zoom { animation: hero-zoom-out 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .img-zoom-container { overflow: hidden; border-radius: 1rem; }
        .img-zoom { transition: transform 0.5s ease; }
        .img-zoom:hover { transform: scale(1.03); }
    </style>
</head>
<body class="transition-colors duration-300 text-zinc-900 dark:text-zinc-100">
    <div id="top-bar" class="w-full py-2 border-b bg-zinc-50 dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 relative z-20 text-xs tracking-widest uppercase">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="hover:text-green-600 transition-colors">Home</a>
            <div class="flex space-x-4">
                <a href="https://www.youtube.com/@Volvox0612" target="_blank"><i data-lucide="youtube"></i></a>
                <a href="https://www.instagram.com/takumi05012/" target="_blank"><i data-lucide="instagram"></i></a>
            </div>
        </div>
    </div>
    <header id="hero-header" class="relative py-32 text-center bg-cover bg-center bg-no-repeat z-10 overflow-hidden" style="background-image: url('images/header.png');">
        <div class="absolute inset-0 bg-white/20 dark:bg-black/30"></div>
        <div class="relative z-10 hero-text-container animate-hero-zoom">
            <h1 class="text-6xl md:text-8xl font-serif mb-2 tracking-tighter">Graphic Design</h1>
            <p class="text-sm tracking-[0.3em] uppercase text-zinc-600 dark:text-zinc-300">Nagano Takumi</p>
        </div>
    </header>
    <nav id="sticky-nav" class="sticky top-0 z-50 transition-all duration-300 py-4 bg-white/95 dark:bg-zinc-900/95 backdrop-blur-md border-y border-zinc-100 dark:border-zinc-800">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest">
            <div class="flex space-x-8">
                <a href="video-editing.html" class="hover:text-green-600">Video</a>
                <a href="graphic-design.html" class="text-green-600">Graphic</a>
                <a href="app-development.html" class="hover:text-green-600">App</a>
                <a href="hobbies.html" class="hover:text-green-600">Hobby</a>
            </div>
            <button id="dark-mode-toggle"><i id="dark-icon" data-lucide="moon"></i><i id="light-icon" data-lucide="sun" class="hidden"></i></button>
        </div>
    </nav>
    <div class="bg-[url('images/back.png')] bg-cover bg-center bg-fixed min-h-screen">
        <div class="bg-white/40 dark:bg-zinc-950/40 backdrop-blur-[2px] min-h-screen py-16">
            <main class="max-w-6xl mx-auto px-4 space-y-24">
                <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
                    <div class="lg:col-span-8"><div class="img-zoom-container shadow-2xl border border-zinc-200 dark:border-zinc-800"><img src="images/0421.png" class="w-full h-auto img-zoom"></div></div>
                    <div class="lg:col-span-4 space-y-8 bg-white/80 dark:bg-zinc-900/80 p-8 rounded-2xl shadow-xl border border-white/20 dark:border-zinc-800/50">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-green-600 border-b border-green-600/20 pb-2 mb-4">Design Details</h3>
                        <p class="text-sm leading-relaxed text-zinc-600 dark:text-zinc-400 font-medium mb-8">ゲームのワンシーンに加工を施し、臨場感のあるデザインに仕上げました。素材の切り抜きや個別のエフェクト調整を丁寧に行っています。</p>
                        <div class="mb-8"><label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1">制作時間</label><div class="text-sm font-bold text-green-600">約1時間</div></div>
                        <div class="mb-8"><label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-3">使用素材</label>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="aspect-square bg-zinc-100 rounded-md overflow-hidden border"><img src="images/sozai1.png" class="w-full h-full object-cover"></div>
                                <div class="aspect-square bg-zinc-100 rounded-md overflow-hidden border"><img src="images/sozai2.png" class="w-full h-full object-cover"></div>
                            </div>
                        </div>
                        <div><label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-2">使用ツール</label><span class="px-2 py-1 bg-zinc-100 dark:bg-zinc-800 rounded text-[10px] font-bold">CapCut</span></div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <footer class="border-t bg-zinc-50 dark:bg-zinc-900 py-8 text-center text-[10px] uppercase tracking-widest text-zinc-400">© 2025 Nagano Takumi</footer>
    <script>
        lucide.createIcons();
        document.getElementById('dark-mode-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            document.getElementById('dark-icon').classList.toggle('hidden');
            document.getElementById('light-icon').classList.toggle('hidden');
            lucide.createIcons();
        });
        window.addEventListener('scroll', () => { document.getElementById('hero-header').style.opacity = Math.max(0, 1 - window.scrollY / 300); });
    </script>
</body>
</html>
